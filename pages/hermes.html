<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hermes - NTN 总控台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px; color: #e0e0e0; background: #1a1a2e;
  position: relative; overflow: hidden;
}
#hermes-page { display: flex; height: 100%; position: relative; }

/* 对话面板 - 相对定位，为输入区留底部空间 */
#chat-panel {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  padding-bottom: 60px; /* 给输入区留位置 */
}

/* 顶部栏 */
.panel-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: #0f1a3a;
  border-bottom: 1px solid #2a2a4a; flex-shrink: 0;
}
.panel-header h2 { font-size: 15px; font-weight: 600; color: #4fc3f7; }
.header-spacer { flex: 1; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot.green { background: #4caf50; }
.status-dot.gray { background: #666; }
.status-dot.red { background: #f44336; }
.status-text { font-size: 12px; color: #a0a0c0; white-space: nowrap; }

/* 信息抽屉按钮 */
#info-toggle {
  background: none; border: none; color: #a0a0c0; font-size: 20px;
  cursor: pointer; padding: 6px 8px; border-radius: 6px; line-height: 1;
}

/* 手机端信息抽屉 */
#info-drawer {
  flex-shrink: 0; background: #16213e; border-bottom: 1px solid #2a2a4a;
  overflow-y: auto; max-height: 40vh;
}
#info-drawer.hidden { display: none; }

/* 消息列表 */
#message-list {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.msg { display: flex; }
.msg-system { justify-content: center; }
.msg-system .msg-bubble { background: #2a2a4a; color: #888; font-size: 12px; padding: 6px 14px; border-radius: 12px; max-width: 90%; }
.msg-user { justify-content: flex-end; }
.msg-user .msg-bubble { background: #0d47a1; color: #fff; max-width: 85%; padding: 10px 14px; border-radius: 14px 14px 4px 14px; line-height: 1.6; }
.msg-assistant { justify-content: flex-start; }
.msg-assistant .msg-bubble { background: #2a2a4a; color: #e0e0e0; max-width: 85%; padding: 10px 14px; border-radius: 14px 14px 14px 4px; line-height: 1.6; }

/* 输入区 - 绝对定位在底部 */
#input-area {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; gap: 8px; padding: 10px 12px;
  background: #0f1a3a; border-top: 1px solid #2a2a4a; z-index: 10;
}
#chat-input {
  flex: 1; background: #1a1a3e; border: 1px solid #3a3a5a; border-radius: 8px;
  color: #e0e0e0; padding: 10px 12px; font-size: 14px; font-family: inherit;
  resize: none; outline: none; min-height: 40px; max-height: 120px;
}
#send-btn {
  background: #4fc3f7; color: #1a1a2e; border: none; border-radius: 8px;
  padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
  white-space: nowrap; align-self: flex-end;
}

/* 信息项通用 */
.info-section { padding: 12px 16px; border-bottom: 1px solid #2a2a4a; }
.info-section:last-child { border-bottom: none; }
.info-section h3 { font-size: 12px; font-weight: 600; color: #a0a0c0; margin-bottom: 8px; }
.info-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 16px; font-size: 13px; }
.info-label { color: #a0a0c0; }
.info-value { color: #e0e0e0; text-align: right; }
.info-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 13px; }
.btn-tiny { background: #2a2a4a; color: #e0e0e0; border: 1px solid #3a3a5a; border-radius: 5px; padding: 4px 12px; font-size: 11px; cursor: pointer; }
.config-form { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.config-form input { background: #1a1a3e; border: 1px solid #3a3a5a; border-radius: 5px; color: #e0e0e0; padding: 7px 10px; font-size: 12px; outline: none; }
.hidden { display: none !important; }
.session-item { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #2a2a4a; cursor: pointer; }
.session-item.empty { color: #666; cursor: default; }
.session-item .session-time { font-size: 11px; color: #666; margin-top: 2px; }

/* 右侧信息侧栏（桌面端） */
#info-sidebar {
  width: 260px; min-width: 260px; border-left: 1px solid #2a2a4a;
  background: #16213e; overflow-y: auto; display: none; flex-shrink: 0;
}

/* 桌面端 */
@media (min-width: 900px) {
  #info-sidebar { display: block; }
  #info-drawer { display: none !important; }
  #chat-panel { padding-bottom: 64px; }
  .panel-header { padding: 14px 24px; }
  #message-list { padding: 16px 24px; }
  #input-area { padding: 12px 24px; }
}
</style>
</head>
<body>

<div id="hermes-page">
  <div id="chat-panel">
    <div class="panel-header">
      <h2>💬 对话</h2>
      <span id="hermes-status" class="status-dot green"></span>
      <span id="status-text" class="status-text">运行中</span>
      <div class="header-spacer"></div>
      <button id="info-toggle" title="信息面板">📋</button>
    </div>

    <!-- 信息抽屉（手机端） -->
    <div id="info-drawer" class="hidden">
      <div class="info-section">
        <h3>📱 企业微信</h3>
        <div class="info-row">
          <span id="wecom-status"><span class="status-dot gray"></span><span>未配置</span></span>
          <button class="btn-tiny" onclick="toggleWecomConfig()">配置</button>
        </div>
        <div id="wecom-form" class="config-form hidden">
          <input type="text" id="corp-id" placeholder="Corp ID">
          <input type="text" id="agent-id" placeholder="Agent ID">
          <input type="password" id="wecom-secret" placeholder="Secret">
          <input type="text" id="wecom-token" placeholder="Token">
          <input type="text" id="wecom-aes" placeholder="EncodingAESKey">
          <button class="btn-tiny" onclick="saveWecomConfig()">保存</button>
        </div>
      </div>
      <div class="info-section">
        <h3>⚙️ 系统状态</h3>
        <div class="info-grid">
          <div class="info-label">模型</div><div class="info-value" id="sys-model">-</div>
          <div class="info-label">版本</div><div class="info-value" id="sys-version">-</div>
          <div class="info-label">运行时间</div><div class="info-value" id="sys-uptime">-</div>
        </div>
      </div>
      <div class="info-section">
        <h3>📋 最近会话</h3>
        <div id="sessions-list"><div class="session-item empty">暂无会话</div></div>
      </div>
    </div>

    <!-- 消息列表 -->
    <div id="message-list">
      <div class="msg msg-system"><div class="msg-bubble">Hermes 已就绪</div></div>
    </div>
  </div>

  <!-- 信息侧栏（桌面端） -->
  <div id="info-sidebar">
    <div class="info-section">
      <h3>📱 企业微信</h3>
      <div class="info-row">
        <span id="wecom-status-d"><span class="status-dot gray"></span><span>未配置</span></span>
        <button class="btn-tiny" onclick="toggleWecomConfigD()">配置</button>
      </div>
      <div id="wecom-form-d" class="config-form hidden">
        <input type="text" id="corp-id-d" placeholder="Corp ID">
        <input type="text" id="agent-id-d" placeholder="Agent ID">
        <input type="password" id="secret-d" placeholder="Secret">
        <input type="text" id="token-d" placeholder="Token">
        <input type="text" id="aes-d" placeholder="EncodingAESKey">
        <button class="btn-tiny" onclick="saveWecomConfigD()">保存</button>
      </div>
    </div>
    <div class="info-section">
      <h3>⚙️ 系统状态</h3>
      <div class="info-grid">
        <div class="info-label">模型</div><div class="info-value" id="sys-model-d">-</div>
        <div class="info-label">版本</div><div class="info-value" id="sys-version-d">-</div>
        <div class="info-label">运行时间</div><div class="info-value" id="sys-uptime-d">-</div>
      </div>
    </div>
    <div class="info-section">
      <h3>📋 最近会话</h3>
      <div id="sessions-list-d"><div class="session-item empty">暂无会话</div></div>
    </div>
  </div>
</div>

<!-- 输入区 - 绝对定位在底部 -->
<div id="input-area">
  <textarea id="chat-input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>
  <button id="send-btn">发送</button>
</div>

<script>
const API = '/api/hermes';

document.addEventListener('DOMContentLoaded', function() {
  loadStatus(); loadSessions(); loadWecom();

  var btn = document.getElementById('send-btn');
  var input = document.getElementById('chat-input');

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
  btn.addEventListener('click', sendMsg);
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  document.getElementById('info-toggle').addEventListener('click', function() {
    document.getElementById('info-drawer').classList.toggle('hidden');
  });

  setInterval(loadStatus, 30000);
  setInterval(loadSessions, 30000);
});

function id(s) { return document.getElementById(s); }

function sendMsg() {
  var input = id('chat-input');
  var text = input.value.trim();
  if (!text) return;
  appendMsg('user', text);
  input.value = ''; input.style.height = 'auto';
  setTimeout(function() { appendMsg('assistant', '收到：' + text); }, 200);
}

function appendMsg(role, text) {
  var div = document.createElement('div');
  div.className = 'msg msg-' + role;
  var b = document.createElement('div');
  b.className = 'msg-bubble';
  b.textContent = text;
  div.appendChild(b);
  id('message-list').appendChild(div);
  id('message-list').scrollTop = id('message-list').scrollHeight;
}

function setT(i, v) { var e = document.getElementById(i); if (e) e.textContent = v || '-'; }
function setH(i, h) { var e = document.getElementById(i); if (e) e.innerHTML = h; }

function loadStatus() {
  fetch(API + '/status').then(function(r){return r.json()}).then(function(d) {
    setT('sys-model', d.model); setT('sys-version', d.version);
    setT('sys-uptime', fmt(d.uptime_seconds));
    setT('sys-model-d', d.model); setT('sys-version-d', d.version); setT('sys-uptime-d', fmt(d.uptime_seconds));
    var c = d.gateway_running ? 'green' : 'gray', t = d.gateway_running ? '运行中' : '未运行';
    document.querySelectorAll('.status-dot').forEach(function(s){s.className='status-dot '+c;});
    document.querySelectorAll('.status-text').forEach(function(s){s.textContent=t;});
  }).catch(function() {
    document.querySelectorAll('.status-dot').forEach(function(s){s.className='status-dot red';});
    document.querySelectorAll('.status-text').forEach(function(s){s.textContent='无法连接';});
  });
}

function loadSessions() {
  fetch(API + '/sessions').then(function(r){return r.json()}).then(function(d) {
    var h = (!d.sessions||d.sessions.length===0)
      ? '<div class="session-item empty">暂无会话</div>'
      : d.sessions.slice(0,8).map(function(s){return '<div class="session-item"><div class="session-title">'+(s.title||'未命名')+'</div><div class="session-time">'+(s.source_platform||'')+(s.message_count?' · '+s.message_count+' 条':'')+'</div></div>';}).join('');
    setH('sessions-list', h); setH('sessions-list-d', h);
  }).catch(function(){});
}

function loadWecom() {
  fetch(API + '/messaging/platforms').then(function(r){return r.json()}).then(function(d) {
    var w = d.platforms ? d.platforms.find(function(p){return p.id==='wecom'||p.name==='企业微信'||p.id==='wechat_work';}) : null;
    var h = w&&w.connected ? '<span class="status-dot green"></span><span>已连接</span>' : (w&&w.enabled ? '<span class="status-dot gray"></span><span>已配置未连接</span>' : '<span class="status-dot gray"></span><span>未配置</span>');
    setH('wecom-status', h); setH('wecom-status-d', h);
  }).catch(function(){});
}

function toggleWecomConfig() { id('wecom-form').classList.toggle('hidden'); }
function toggleWecomConfigD() { id('wecom-form-d').classList.toggle('hidden'); }

function saveWecom(c,a,s,t,k) {
  if(!c||!s){alert('Corp ID 和 Secret 必填');return;}
  fetch(API+'/messaging/platforms/wecom',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:true,env:{WECOM_CORP_ID:c,WECOM_AGENT_ID:a,WECOM_SECRET:s,WECOM_TOKEN:t,WECOM_AES_KEY:k}})})
  .then(function(r){if(r.ok){alert('已保存');id('wecom-form').classList.add('hidden');id('wecom-form-d').classList.add('hidden');loadWecom();}else{r.text().then(function(t){alert('失败: '+t);});}})
  .catch(function(e){alert('失败: '+e.message);});
}
function saveWecomConfig() { saveWecom(id('corp-id').value,id('agent-id').value,id('wecom-secret').value,id('wecom-token').value,id('wecom-aes').value); }
function saveWecomConfigD() { saveWecom(id('corp-id-d').value,id('agent-id-d').value,id('secret-d').value,id('token-d').value,id('aes-d').value); }

function fmt(s){if(!s)return null;var d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);return(d>0?d+'天':'')+(h>0?h+'时':'')+m+'分';}
</script>
</body>
</html>
