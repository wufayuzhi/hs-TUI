<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL-HTTP 队列</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e; color: #e0e0e0;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px; padding: 24px;
}
h2 { color: #4fc3f7; font-size: 20px; margin-bottom: 20px; }

.cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.card { background: #16213e; border-radius: 8px; padding: 16px; border: 1px solid #2a2a4a; }
.card .label { font-size: 12px; color: #a0a0c0; margin-bottom: 6px; }
.card .value { font-size: 18px; font-weight: 600; }
.card .green  { color: #66bb6a; }
.card .yellow { color: #ffa726; }
.card .red    { color: #ef5350; }
.card .blue   { color: #42a5f5; }

.actions { margin-bottom: 16px; }
.btn {
  padding: 8px 20px; border-radius: 6px; border: 1px solid #2a2a4a;
  background: #16213e; color: #e0e0e0; font-size: 13px; cursor: pointer;
  transition: 0.15s;
}
.btn:hover { background: #1a1a3e; border-color: #4fc3f7; }
.btn.primary { background: #1a237e; border-color: #4fc3f7; color: #4fc3f7; }
.btn.primary:hover { background: #283593; }

.filters { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
.filters select {
  background: #0d0d1a; border: 1px solid #2a2a4a; border-radius: 6px;
  padding: 6px 12px; color: #e0e0e0; font-size: 13px;
}

.status-bar { font-size: 12px; color: #666; margin-left: auto; }

.task-list { background: #16213e; border-radius: 8px; border: 1px solid #2a2a4a; overflow: hidden; }
.task-hdr, .task-row {
  display: grid; grid-template-columns: 70px 1fr 90px 130px 70px;
  padding: 10px 16px; font-size: 13px; align-items: center;
}
.task-hdr { background: #0d0d1a; color: #a0a0c0; font-weight: 600; border-bottom: 1px solid #2a2a4a; }
.task-row { border-bottom: 1px solid #1a1a3e; cursor: pointer; transition: 0.1s; }
.task-row:hover { background: #1a1a3e; }
.task-row:last-child { border-bottom: none; }

.tag {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; text-align: center;
}
.tag.green  { background: #1b5e20; color: #a5d6a7; }
.tag.blue   { background: #1a237e; color: #90caf9; }
.tag.orange { background: #e65100; color: #ffcc80; }
.tag.red    { background: #b71c1c; color: #ef9a9a; }
.tag.gray   { background: #37474f; color: #b0bec5; }

/* 详情弹窗 */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  justify-content: center; align-items: center; z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px;
  width: 80%; max-width: 640px; max-height: 80vh; overflow-y: auto;
  padding: 24px;
}
.modal h3 { color: #4fc3f7; margin-bottom: 16px; }
.modal-table { width: 100%; font-size: 13px; }
.modal-table td { padding: 6px 10px; vertical-align: top; }
.modal-table td:first-child { color: #a0a0c0; width: 100px; }
.modal .content-box {
  background: #0d0d1a; border: 1px solid #2a2a4a; border-radius: 6px;
  padding: 10px; font-family: monospace; font-size: 12px; color: #a0a0c0;
  white-space: pre-wrap; max-height: 200px; overflow-y: auto;
}
.modal-close {
  float: right; background: none; border: 1px solid #2a2a4a; color: #666;
  padding: 4px 12px; border-radius: 4px; cursor: pointer;
}
.modal-close:hover { border-color: #4fc3f7; color: #e0e0e0; }

.loading { text-align: center; padding: 40px; color: #666; }
</style>
</head>
<body>

<h2>📋 SQL-HTTP 任务队列</h2>

<div class="cards">
  <div class="card"><div class="label">排队中</div><div class="value yellow" id="s-queued">-</div></div>
  <div class="card"><div class="label">执行中</div><div class="value blue" id="s-running">-</div></div>
  <div class="card"><div class="label">已完成</div><div class="value green" id="s-done">-</div></div>
  <div class="card"><div class="label">失败</div><div class="value red" id="s-failed">-</div></div>
</div>

<div class="filters">
  <button class="btn primary" onclick="refresh()">🔄 刷新</button>
  <select id="status-filter" onchange="render()">
    <option value="">全部状态</option>
    <option value="queued">排队中</option>
    <option value="running">执行中</option>
    <option value="done">已完成</option>
    <option value="failed">失败</option>
  </select>
  <span class="status-bar" id="status-bar"></span>
</div>

<div class="task-list">
  <div class="task-hdr">
    <span>编号</span><span>任务名称</span><span>状态</span><span>更新时间</span><span>操作</span>
  </div>
  <div id="task-body">
    <div class="loading">加载中...</div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">✕</button>
    <h3>📋 任务详情</h3>
    <table class="modal-table" id="detail-table"></table>
  </div>
</div>

<script>
var tasks = [];

async function refresh() {
  document.getElementById("task-body").innerHTML = '<div class="loading">加载中...</div>';
  try {
    var r = await fetch("/api/sql-proxy/events");
    if (!r.ok) throw new Error("HTTP " + r.status);
    var data = await r.json();
    // Try tasks endpoint too
    var r2 = await fetch("/api/sql-proxy/tasks");
    if (r2.ok) {
      var t = await r2.json();
      tasks = t.tasks || t.results || t || [];
    } else {
      tasks = data.events || [];
    }
    render();
  } catch(e) {
    document.getElementById("task-body").innerHTML = '<div class="loading">连接失败: ' + e.message + '</div>';
  }
}

function render() {
  var filter = document.getElementById("status-filter").value;
  var filtered = filter ? tasks.filter(function(t) {
    var s = (t.status || "").toLowerCase();
    return s === filter;
  }) : tasks;

  document.getElementById("status-bar").textContent = "共 " + filtered.length + " 条";

  // 统计数据
  var q=0, r=0, d=0, f=0;
  tasks.forEach(function(t) {
    var s = (t.status || "").toLowerCase();
    if (s === "queued" || s === "pending") q++;
    else if (s === "running" || s === "claimed" || s === "executing") r++;
    else if (s === "done" || s === "finished" || s === "success" || s === "completed") d++;
    else if (s === "failed" || s === "error") f++;
  });
  document.getElementById("s-queued").textContent = q;
  document.getElementById("s-running").textContent = r;
  document.getElementById("s-done").textContent = d;
  document.getElementById("s-failed").textContent = f;

  if (filtered.length === 0) {
    document.getElementById("task-body").innerHTML = '<div class="loading">暂无任务</div>';
    return;
  }

  document.getElementById("task-body").innerHTML = filtered.map(function(t) {
    var s = (t.status || "unknown").toLowerCase();
    var tagClass = "gray";
    if (s === "done" || s === "finished" || s === "success" || s === "completed") tagClass = "green";
    else if (s === "running" || s === "claimed" || s === "executing") tagClass = "blue";
    else if (s === "queued" || s === "pending") tagClass = "orange";
    else if (s === "failed" || s === "error") tagClass = "red";
    var time = t.updated_at || t.created_at || t.created || "-";
    if (time && time.length > 16) time = time.slice(0, 16);
    return '<div class="task-row" onclick="showDetail(' + JSON.stringify(t).replace(/"/g,"'") + ')">'
      + '<span style="color:#666;font-family:monospace;">#' + (t.id || "-") + '</span>'
      + '<span>' + (t.title || t.name || t.task_type || "任务 #" + t.id) + '</span>'
      + '<span class="tag ' + tagClass + '">' + (t.status || "?") + '</span>'
      + '<span style="color:#666;font-size:12px;">' + time + '</span>'
      + '<span style="color:#42a5f5;font-size:12px;">查看</span>'
      + '</div>';
  }).join("");
}

function showDetail(t) {
  var html = "";
  var fields = [
    ["任务 ID", t.id],
    ["名称", t.title || t.name || t.task_type],
    ["状态", t.status],
    ["角色", t.target_role || t.role || "-"],
    ["来源", t.source || t.creator || "-"],
    ["创建时间", t.created_at || t.created || "-"],
    ["开始时间", t.started_at || "-"],
    ["完成时间", t.finished_at || t.updated_at || "-"],
    ["Prompt", '<div class="content-box">' + e(t.prompt || t.description || "-") + '</div>'],
    ["结果", '<div class="content-box">' + e(t.result || t.output || t.error || "-") + '</div>']
  ];
  fields.forEach(function(f) {
    html += '<tr><td>' + f[0] + '</td><td>' + f[1] + '</td></tr>';
  });
  document.getElementById("detail-table").innerHTML = html;
  document.getElementById("modal").classList.add("show");
}

function e(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// 首次加载 + 15秒自动刷新
refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
