<!DOCTYPE html>
<html lang=zh-CN>
<head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Hermes 对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#1a1a2e}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;color:#e0e0e0}
#wrap{height:100%;display:flex;flex-direction:column;min-height:0}
hdr{display:flex;align-items:center;padding:10px 14px;background:#0f1a3a;border-bottom:1px solid #2a2a4a;flex-shrink:0}
hdr h2{font-size:15px;font-weight:600;color:#4fc3f7}
.sp{flex:1}
#msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;min-height:0;-webkit-overflow-scrolling:touch}
#ia{flex-shrink:0;display:flex;gap:6px;padding:8px 14px 10px;background:#0f1a3a;border-top:2px solid #4fc3f7}#ia{padding:8px 14px calc(10px + env(safe-area-inset-bottom,0px))}
#ci{flex:1;background:#1a1a3e;border:2px solid #4fc3f7;border-radius:8px;color:#e0e0e0;padding:9px 12px;font-size:16px;font-family:inherit;resize:none;outline:none;min-height:40px;max-height:100px}
#ci:focus{border-color:#29b6f6}
#sb{background:#4fc3f7;color:#1a1a2e;border:none;border-radius:8px;padding:10px 22px;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0}
#sb:active{background:#29b6f6}
.msg{display:flex}
.mu{justify-content:flex-end}.mu .b{background:#0d47a1;color:#fff;max-width:85%;padding:9px 13px;border-radius:14px 14px 4px 14px;line-height:1.5;font-size:13px;word-break:break-word}
.ma{justify-content:flex-start}.ma .b{background:#2a2a4a;color:#e0e0e0;max-width:85%;padding:9px 13px;border-radius:14px 14px 14px 4px;line-height:1.5;font-size:13px;word-break:break-word}
</style></head>
<body><div id=wrap>
<hdr><h2>💬 对话</h2><div class=sp></div></hdr>
<div id=msgs></div>
<div id=ia><textarea id=ci rows=1 placeholder="输入消息... (Enter 发送)"></textarea><button id=sb>发送</button></div>
</div>
<script>
// 键盘弹出时调整高度，收起时恢复
var vph=window.innerHeight
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',function(){
    var h=window.visualViewport.height
    document.getElementById('wrap').style.height=(h<vph-100?h+'px':'100%')
  })
}
var K='webchat-key-1781853969',ms=document.getElementById("msgs"),ci=document.getElementById("ci"),sb=document.getElementById("sb")
var msgs=[]
sb.onclick=s;ci.onkeydown=function(e){if(e.key=="Enter"&&!e.shiftKey){e.preventDefault();s()}}
ci.oninput=function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,80)+"px"}
// 手机键盘弹出时确保输入框可见
ci.onfocus=function(){setTimeout(function(){ci.scrollIntoView({behavior:"smooth",block:"center"})},300)}
function s(){var t=ci.value.trim();if(!t)return;add("mu",t);ci.value="";ci.style.height="auto";msgs.push({role:"user",content:t})
fetch("/api/hermes/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+K},body:JSON.stringify({model:"deepseek-v4-flash",messages:msgs})})
.then(function(r){return r.json()})
.then(function(d){var r=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||d.error&&d.error.message||"—";add("ma",r);msgs.push({role:"assistant",content:r})})
.catch(function(){add("ma","连接失败")})}
function add(r,t){var d=document.createElement("div");d.className="msg "+r;var b=document.createElement("div");b.className="b";b.textContent=t;d.appendChild(b);ms.appendChild(d);ms.scrollTop=ms.scrollHeight}
// 强制适配 iframe 高度（100vh 兜底）
var w=document.getElementById('wrap')
function fixH(){w.style.height=window.innerHeight+'px'}
fixH();window.addEventListener('resize',fixH);setTimeout(fixH,100)
</script></body></html>
