<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCB - NTN 总控台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e; color: #e0e0e0;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px; padding: 20px;
}

/* ── 标题 ── */
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.header h2 { color: #4fc3f7; font-size: 20px; }
.badge { font-size: 12px; padding: 2px 10px; border-radius: 10px;
  background: #2a2a4a; color: #a0a0c0; }

/* ── 状态卡片 ── */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
.card { background: #16213e; border-radius: 8px; padding: 14px; border: 1px solid #2a2a4a; }
.card .label { font-size: 11px; color: #a0a0c0; margin-bottom: 4px; }
.card .value { font-size: 15px; font-weight: 600; word-break: break-all; }
.value.green { color: #66bb6a; }
.value.gray  { color: #90a4ae; }
.value.blue  { color: #42a5f5; }
.value.orange { color: #ffa726; }

/* ── Tab 切换 ── */
.tabs { display: flex; gap: 0; margin-bottom: 12px; border: 1px solid #2a2a4a; border-radius: 8px; overflow: hidden; }
.tab { flex: 1; padding: 10px; text-align: center; cursor: pointer;
  background: #0f1a3a; color: #8a9aba; font-size: 13px; transition: 0.15s; border-right: 1px solid #2a2a4a; }
.tab:last-child { border-right: none; }
.tab.active { background: #1a3a7a; color: #fff; }
.tab:hover:not(.active) { background: #1a2a5a; }

/* ── 视图容器 ── */
.view { display: none; }
.view.active { display: block; }

/* ── 进度面板（摘要视图） ── */
.progress-panel {
  background: #16213e; border-radius: 8px; border: 1px solid #2a2a4a;
  padding: 20px; margin-bottom: 16px;
}
.progress-panel h3 { color: #4fc3f7; font-size: 15px; margin-bottom: 14px; }

.stage-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.stage-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 8px; background: #0f1a3a; font-size: 13px;
}
.stage-icon { font-size: 16px; min-width: 24px; }
.stage-name { flex: 1; }
.stage-status { font-size: 11px; color: #666; }

/* ── 进度条 ── */
.progress-bar-bg { height: 6px; background: #2a2a4a; border-radius: 3px; margin: 10px 0; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #4fc3f7, #42a5f5);
  border-radius: 3px; width: 0%; transition: width 0.5s; }

/* ── 详细操作列表 ── */
.detail-list { margin-top: 12px; }
.detail-item {
  font-size: 12px; padding: 6px 0; color: #a0c0e0;
  border-bottom: 1px solid #1e2d5a; font-family: "Menlo", "Consolas", monospace;
}

/* ── 日志视图 ── */
.log-box {
  background: #0d0d1a; border: 1px solid #2a2a4a; border-radius: 8px;
  display: flex; flex-direction: column; max-height: 600px;
}
.log-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 14px; border-bottom: 1px solid #2a2a4a;
  font-size: 12px; color: #a0a0c0; background: #0f0f20;
}
.log-meta { color: #666; font-size: 11px; }

#log-content {
  padding: 10px 14px; font-family: "Menlo", "Consolas", monospace;
  font-size: 12px; line-height: 1.6; color: #a0c0e0;
  overflow: auto; max-height: 560px; white-space: pre-wrap;
  word-break: break-all; margin: 0;
}

/* ── 操作按钮 ── */
.actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.btn {
  padding: 7px 16px; border-radius: 6px; border: 1px solid #2a2a4a;
  background: #16213e; color: #e0e0e0; font-size: 13px; cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: #1a1a3e; border-color: #4fc3f7; }
.btn.primary { background: #1a237e; border-color: #4fc3f7; color: #4fc3f7; }
.btn.primary:hover { background: #283593; }

/* ── Remote Control ── */
.remote-section { background: #16213e; border-radius: 8px; border: 1px solid #2a2a4a; overflow: hidden; margin-top: 16px; }
.remote-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid #2a2a4a;
}
.remote-header h3 { color: #4fc3f7; font-size: 14px; }
.remote-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px; gap: 10px; background: #0d0d1a; color: #666; font-size: 13px;
}

/* ── 空闲状态 ── */
.idle-box {
  text-align: center; padding: 30px 20px; color: #666;
}
.idle-box .big-icon { font-size: 40px; opacity: 0.3; margin-bottom: 8px; }

/* ── 手机端适配 ── */
@media (max-width: 768px) {
  body { padding: 12px; }
  .header h2 { font-size: 17px; }
  .cards { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .card { padding: 10px; }
  .card .value { font-size: 13px; }
  .tabs { flex-direction: column; }
  .tab { border-right: none; border-bottom: 1px solid #2a2a4a; }
  .tab:last-child { border-bottom: none; }
  .progress-panel { padding: 14px; }
  .remote-placeholder { padding: 24px 16px; }
  .actions { gap: 6px; }
  .actions .btn { font-size: 12px; padding: 6px 12px; }
}
</style>
</head>
<body>

<div class="header">
  <h2>🤖 CCB 管理</h2>
  <span class="badge" id="version-badge">加载中...</span>
  <span class="badge" id="ccb-status-badge" style="display:none;"></span>
</div>

<!-- 状态卡片 -->
<div class="cards">
  <div class="card">
    <div class="label">CCB 状态</div>
    <div class="value gray" id="ccb-status">检查中...</div>
  </div>
  <div class="card">
    <div class="label">当前任务</div>
    <div class="value gray" id="task-status">-</div>
  </div>
  <div class="card">
    <div class="label">执行步骤</div>
    <div class="value gray" id="step-status">-</div>
  </div>
  <div class="card">
    <div class="label">文件操作</div>
    <div class="value gray" id="stats-status">-</div>
  </div>
</div>

<!-- 操作按钮 -->
<div class="actions">
  <button class="btn primary" onclick="checkCCB()">🔄 刷新</button>
  <button class="btn" onclick="showView('summary')">📊 进度摘要</button>
  <button class="btn" onclick="showView('log')">📋 详细日志</button>
</div>

<!-- Tab 切换 -->
<div class="tabs">
  <div class="tab active" onclick="showView('summary')">📊 任务进度摘要</div>
  <div class="tab" onclick="showView('log')">📋 详细执行日志</div>
</div>

<!-- 视图1: 进度摘要 -->
<div class="view active" id="view-summary">
  <div class="progress-panel">
    <h3>📊 实时进度</h3>
    <div id="idle-view">
      <div class="idle-box">
        <div class="big-icon">⏸️</div>
        <div>当前没有执行中的任务</div>
        <div style="font-size:12px;margin-top:4px;">CCB 空闲中，等待新任务...</div>
      </div>
    </div>
    <div id="active-view" style="display:none;">
      <div id="summary-text" style="font-size:14px;margin-bottom:10px;"></div>
      <div class="stage-list" id="stage-list"></div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:12px;">
        <span id="p-task-name">-</span>
        <span id="p-step-name">-</span>
      </div>
      <div class="detail-list" id="detail-list"></div>
    </div>
  </div>
</div>

<!-- 视图2: 详细日志 -->
<div class="view" id="view-log">
  <div class="log-box">
    <div class="log-header">
      <span>CCB 实时执行日志</span>
      <span class="log-meta" id="log-meta"></span>
    </div>
    <pre id="log-content">等待日志...</pre>
  </div>
</div>

<script>
const CCB_URL = "/api/ccb-progress";
let logTimer = null;
let currentView = "summary";

function $(id) { return document.getElementById(id); }

// Tab / 视图切换
function showView(name) {
  currentView = name;
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("view-" + name).classList.add("active");
  document.querySelectorAll(".tab")[name === "summary" ? 0 : 1].classList.add("active");

  if (name === "log") {
    if (!logTimer) { fetchLog(); logTimer = setInterval(fetchLog, 3000); }
  } else {
    if (logTimer) { clearInterval(logTimer); logTimer = null; }
  }
}

// 计算进度百分比（基于阶段）
function calcProgress(status, step) {
  if (status === "done" || status === "completed") return 100;
  if (status === "idle") return 0;
  const order = ["分析需求", "方案设计", "编码实现", "测试验证", "完成"];
  const idx = order.indexOf(step);
  if (idx >= 0) return Math.round((idx + 1) / order.length * 100);
  return 30;
}

// 渲染进度摘要
function renderSummary(data) {
  if (!data || data.status === "idle" || !data.task) {
    $("#idle-view").style.display = "block";
    $("#active-view").style.display = "none";
    return;
  }
  $("#idle-view").style.display = "none";
  $("#active-view").style.display = "block";

  let summary = data.summary || "处理中...";
  let step = data.step || "未知";
  let status = data.status || "running";
  let details = data.details || [];
  let stats = data.stats || {};

  // 阶段图标
  const stageIcons = {"分析需求":"🔍","方案设计":"📐","编码实现":"✏️","测试验证":"🧪","完成":"✅"};
  let icon = stageIcons[step] || "🔄";

  // 标题
  $("#summary-text").textContent = summary;

  // 进度条
  let pct = calcProgress(status, step);
  let fill = document.getElementById("progress-fill");
  fill.style.width = pct + "%";
  fill.style.background = pct >= 100
    ? "linear-gradient(90deg, #66bb6a, #81c784)"
    : "linear-gradient(90deg, #4fc3f7, #42a5f5)";

  $("#p-task-name").textContent = "📋 " + data.task;
  $("#p-step-name").textContent = icon + " " + step + "  (" + pct + "%)";

  // 阶段卡片
  const stages = ["分析需求","方案设计","编码实现","测试验证","完成"];
  let stageHtml = "";
  let found = false;
  for (let s of stages) {
    let si = stageIcons[s] || "⬜";
    let active = s === step;
    let done = stages.indexOf(s) < stages.indexOf(step);
    if (active) found = true;
    if (!found && !done && s !== step) continue;
    let cls = done ? "✅" : (active ? "▶️" : "⏳");
    let bg = done ? "#1a3a2a" : (active ? "#1a3a7a" : "#0f1a3a");
    let col = done ? "#66bb6a" : (active ? "#4fc3f7" : "#666");
    stageHtml +=
      `<div class="stage-item" style="background:${bg}">
        <span class="stage-icon">${cls}</span>
        <span class="stage-name" style="color:${col}">${cls} ${s}</span>
      </div>`;
  }
  document.getElementById("stage-list").innerHTML = stageHtml;

  // 统计信息
  let statParts = [];
  if (stats.read) statParts.push("📖 分析" + stats.read + "个文件");
  if (stats.write) statParts.push("✏️ 修改" + stats.write + "个文件");
  if (stats.run) statParts.push("⚙️ 运行" + stats.run + "次命令");
  $("#stats-status").textContent = statParts.join(" | ") || "-";

  // 详细操作
  let detailHtml = details.length
    ? details.map(d => `<div class="detail-item">${d}</div>`).join("")
    : '<div class="detail-item" style="color:#666">暂无详细操作记录</div>';
  document.getElementById("detail-list").innerHTML = detailHtml;
}

// 检查 CCB 状态
async function checkCCB() {
  try {
    // 版本
    let r = await fetch(CCB_URL + "/version");
    let v = await r.json();
    $("#version-badge").textContent = v.version || "未知";

    // 进度
    r = await fetch(CCB_URL + "/status");
    let s = await r.json();

    if (!s.task || s.status === "idle") {
      $("#ccb-status").textContent = "⏹ 空闲";
      $("#ccb-status").className = "value gray";
      renderSummary({status:"idle"});
      $("#step-status").textContent = "-";
      $("#task-status").textContent = "无";
    } else {
      $("#ccb-status").textContent = "▶ 执行中";
      $("#ccb-status").className = "value green";
      $("#task-status").textContent = s.task;
      $("#step-status").textContent = s.step || "-";
      renderSummary(s);
    }

    let ts = s.updated_at || "-";
    if (ts !== "-" && ts.length > 10) ts = ts.slice(0, 19).replace("T", " ");
    $("#time-status").textContent = ts;
    $("#time-status").parentElement.querySelector(".label").textContent = "更新时间";

  } catch (e) {
    $("#version-badge").textContent = "连接失败";
    $("#ccb-status").textContent = "⚠ 无法连接";
    $("#ccb-status").className = "value gray";
  }
}

// 获取日志
async function fetchLog() {
  try {
    let r = await fetch(CCB_URL + "/log?lines=100");
    let data = await r.json();
    let el = $("log-content");
    el.textContent = data.log || "[空]";
    $("log-meta").textContent = "共 " + data.total_lines + " 行 | " + (data.files||[]).length + " 个文件";
    el.scrollTop = el.scrollHeight;
  } catch(e) {
    $("log-content").textContent = "拉取日志失败: " + e.message;
  }
}

// 启动定时器
checkCCB();
setInterval(checkCCB, 5000);
</script>
</body>
</html>
